<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی دیجیتال کافه شازده</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- فونت‌های فارسی -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37; /* رنگ طلایی برای جزئیات */
            --bg-dark: #1a0000;
            --bg-red: #3d0000;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, var(--bg-red), var(--bg-dark));
            background-attachment: fixed;
            color: #eee;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* پس‌زمینه محو قهوه */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.07;
            filter: blur(8px);
            z-index: -2;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5));
            border-bottom: 2px solid var(--accent);
        }

        header h1 { 
            font-family: 'Noto Naskh Arabic', serif; /* فونت نستعلیق مدرن */
            font-size: 3.5rem; 
            margin: 0; 
            color: #fff; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        .category-nav {
            position: sticky; top: 0;
            background: rgba(40, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex; overflow-x: auto; padding: 15px; gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav-item {
            background: rgba(255,255,255,0.05);
            color: #ccc; padding: 8px 18px; border-radius: 30px;
            text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item:hover, .nav-item.active { background: var(--accent); color: #000; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        .item-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 15px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .item-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .item-details h3 { margin: 0; color: #fff; }
        .item-price { font-weight: bold; color: var(--accent); }

        footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>کافه شازده</h1>
    <p>لحظاتی خوش برای شما</p>
</header>

<nav class="category-nav" id="main-nav"></nav>
<div class="container" id="menu-container"></div>

<footer>&copy; کافه شازده</footer>

<script>
    const menuData = [
        { name: "قهوه", icon: "fa-coffee", items: [{ title: "اسپرسو سینگل", price: "۴۵,۰۰۰", desc: "۱۰۰٪ عربیکا خالص", img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?q=80&w=200" }] },
        { name: "کیک و دسر", icon: "fa-cake-candles", items: [{ title: "کیک شکلاتی", price: "۸۵,۰۰۰", desc: "تازه و خانگی", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=200" }] }
        // ... (سایر آیتم‌ها را اینجا اضافه کنید)
    ];

    function renderMenu() {
        const nav = document.getElementById('main-nav');
        const container = document.getElementById('menu-container');
        menuData.forEach((section, idx) => {
            const sectionId = `cat-${idx}`;
            nav.innerHTML += `<a href="#${sectionId}" class="nav-item">${section.name}</a>`;
            let itemsHTML = section.items.map(item => `
                <div class="item-card">
                    <img src="${item.img}" class="item-img">
                    <div class="item-details"><h3>${item.title}</h3><p>${item.desc}</p></div>
                    <div class="item-price">${item.price}</div>
                </div>
            `).join('');
            container.innerHTML += `<div id="${sectionId}"><h2>${section.name}</h2>${itemsHTML}</div>`;
        });
    }
    renderMenu();
</script>

</body>
</html>
