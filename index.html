V<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی دیجیتال کافه</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-Variable-font-face.css" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #2c2420; color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .tab { background: #d2a679; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; color: #333; font-weight: bold; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .item { background: #3d332e; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .price { color: #d2a679; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header"><h1>کافه شما</h1></div>

<div class="tabs" id="tabs"></div>
<div id="menu-container" class="menu-grid"></div>

<script>
    // این بخش را تغییر دهید تا منو آپدیت شود
    const menuData = [
        { name: "اسپرسو", cat: "قهوه", price: "۴۵,۰۰۰" },
        { name: "آیس لاته", cat: "قهوه سرد", price: "۶۵,۰۰۰" },
        { name: "هات چاکلت", cat: "نوشیدنی گرم", price: "۵۵,۰۰۰" },
        { name: "کیک شکلاتی", cat: "کیک و دسر", price: "۷۰,۰۰۰" },
        { name: "املت مخصوص", cat: "صبحانه", price: "۹۰,۰۰۰" },
        { name: "موهیتو", cat: "نوشیدنی سرد", price: "۶۰,۰۰۰" },
        { name: "دمنوش گل‌گاوزبان", cat: "دمنوش", price: "۴۰,۰۰۰" },
        { name: "شیک نوتلا", cat: "شیک‌ها", price: "۸۵,۰۰۰" },
        { name: "سیب‌زمینی", cat: "میان‌وعده", price: "۵۰,۰۰۰" }
    ];

    const categories = ["قهوه", "قهوه سرد", "نوشیدنی گرم", "کیک و دسر", "صبحانه", "نوشیدنی سرد", "دمنوش", "شیک‌ها", "میان‌وعده"];

    // ساخت تب‌ها
    const tabsContainer = document.getElementById('tabs');
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tab'; btn.innerText = cat;
        btn.onclick = () => render(cat);
        tabsContainer.appendChild(btn);
    });

    function render(cat) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        menuData.filter(i => i.cat === cat).forEach(item => {
            container.innerHTML += `<div class="item"><span>${item.name}</span><span class="price">${item.price} تومان</span></div>`;
        });
    }
    render("قهوه"); // پیش‌فرض
</script>
</body>
</html>
