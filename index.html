<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منوی دیجیتال کافه شازده</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&family=Noto+Naskh+Arabic:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #eecda3; /* رنگ کرم-طلایی روشن */
            --bg-red-light: #5d0000; /* قرمز روشن‌تر */
            --bg-red-dark: #3a0000;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            background: radial-gradient(circle, var(--bg-red-light), var(--bg-red-dark));
            background-attachment: fixed;
            color: #fff;
            overflow-x: hidden;
        }

        /* وکتورهای محو قهوه در پس‌زمینه */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            /* استفاده از وکتورهای آنلاین قهوه با شفافیت بسیار کم */
            background-image: url('https://www.transparenttextures.com/patterns/coffee-beans.png');
            opacity: 0.15; /* بسیار کمرنگ */
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4));
        }

        .logo {
            width: 150px; /* اندازه لوگوی شما */
            height: auto;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        header h1 { 
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 2.8rem;
            margin: 10px 0;
            color: var(--accent);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .category-nav {
            position: sticky; top: 0;
            background: rgba(60, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: flex; overflow-x: auto; padding: 15px; gap: 10px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
        }

        .nav-item {
            background: rgba(255,255,255,0.1);
            color: #fff; padding: 10px 22px; border-radius: 50px;
            text-decoration: none; font-size: 0.95rem; 
            border: 1px solid rgba(238, 205, 163, 0.3);
            white-space: nowrap;
            transition: 0.3s;
        }

        .nav-item.active, .nav-item:hover {
            background: var(--accent);
            color: #3d0000;
            font-weight: bold;
        }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .category-title {
            font-size: 1.8rem;
            border-right: 5px solid var(--accent);
            padding-right: 15px;
            margin: 40px 0 20px;
            color: var(--accent);
        }

        .item-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }

        .item-card:active { transform: scale(0.98); }

        .item-img { 
            width: 85px; height: 85px; 
            border-radius: 15px; 
            object-fit: cover;
            background: #222; 
        }

        .item-details { flex: 1; }
        .item-details h3 { margin: 0; font-size: 1.2rem; color: #fff; }
        .item-details p { margin: 5px 0 0; font-size: 0.85rem; color: #ccc; }

        .item-price { 
            font-size: 1.1rem; 
            font-weight: bold; 
            color: var(--accent);
            text-align: left;
        }

        footer { text-align: center; padding: 50px; opacity: 0.6; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <!-- جایگذاری لوگوی شما -->
    <img src="https://i.ibb.co/3ykC3mS/Asset-12.png" alt="لوگو کافه شازده" class="logo">
    <h1>کافه شازده</h1>
    <p>میزبان لحظات شازده‌وار شما</p>
</header>

<nav class="category-nav" id="main-nav">
    <!-- دسته‌ها توسط جاوااسکریپت ساخته می‌شوند -->
</nav>

<div class="container" id="menu-container">
    <!-- آیتم‌ها توسط جاوااسکریپت ساخته می‌شوند -->
</div>

<footer>طراحی شده برای کافه شازده &copy; ۲۰۲۶</footer>

<script>
    const menuData = [
        { 
            name: "قهوه", 
            items: [
                { title: "اسپرسو سینگل", price: "۴۵,۰۰۰", desc: "۱۰۰٪ عربیکا - عصاره‌گیری استاندارد", img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?q=80&w=200" },
                { title: "کاپوچینو", price: "۷۵,۰۰۰", desc: "ترکیب اسپرسو و شیر فوم‌دار", img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?q=80&w=200" }
            ] 
        },
        { 
            name: "کیک و دسر", 
            items: [
                { title: "کیک شکلاتی", price: "۸۵,۰۰۰", desc: "کیک گرم با سس شکلات مخصوص", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=200" }
            ] 
        }
    ];

    function renderMenu() {
        const nav = document.getElementById('main-nav');
        const container = document.getElementById('menu-container');
        
        menuData.forEach((section, idx) => {
            const sectionId = `cat-${idx}`;
            
            // افزودن به نوار ناوبری
            const navItem = document.createElement('a');
            navItem.href = `#${sectionId}`;
            navItem.className = 'nav-item';
            navItem.innerText = section.name;
            nav.appendChild(navItem);

            // افزودن بخش محصولات
            let itemsHTML = section.items.map(item => `
                <div class="item-card">
                    <img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/150?text=Cafe'">
                    <div class="item-details">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="item-price">${item.price}</div>
                </div>
            `).join('');

            container.innerHTML += `
                <div id="${sectionId}">
                    <h2 class="category-title">${section.name}</h2>
                    ${itemsHTML}
                </div>
            `;
        });
    }
    renderMenu();
</script>

</body>
</html>
